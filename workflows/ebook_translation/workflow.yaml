# 电子书翻译工作流
# 从ePub/TXT提取文本 → 并发翻译 → 句子级对齐 → 生成中英对照ePub

project_name: "ebook_translation"
name: "电子书翻译流水线"
description: "用LLM_agent框架实现电子书翻译（支持ePub/TXT），保留原E_book_translation项目的提示词逻辑"

# 路径配置
paths:
  original: "artifacts/original"      # 原文文本块
  translated: "artifacts/translated"  # 翻译结果
  aligned: "artifacts/aligned"        # 对齐结果
  polished: "artifacts/polished"      # 润色+词汇标注结果
  results: "results"                  # 最终成果

# 工作流图：提取 -> 翻译 -> 对齐 -> 生成 -> 结束
workflow_graph: "1 -> 2 -> 3 -> 4 -> 5 -> END"

steps:
  # ========================================
  # 步骤1：提取并切分文本
  # ========================================
  "1":
    name: "提取并切分文本"
    type: "epub_extract"
    input_key: "input_epub"
    target_tokens: 1000       # 每块目标 token 数
    emergency_threshold: 1500 # 超出此值触发强制截断
    save_to_file:
      output_dir: "{paths.original}"
      filename_template: "chunk_{index:04d}.txt"
    # 输出：1_response (文本块列表)

  # ========================================
  # 步骤2：并发翻译（JSON格式，简化版）
  # ========================================
  "2":
    name: "并发翻译"
    type: "concurrent"
    items_key: "1_response"  # 使用步骤1的文本块列表
    max_concurrent: 5        # 同时翻译5个块
    task_dispatch_delay: 1.0 # 每个任务间隔1秒（避免API限流）
    fail_on_error: true      # 任何块重试耗尽后终止，防止步骤3用残缺数据运行

    # 保存每个翻译结果到文件（断点续传）
    save_to_file:
      output_dir: "{paths.translated}"
      filename_template: "trans_{index:04d}.txt"
      data_key: "translation_result.translated_text"  # 点路径：直接从 llm_call 输出中提取

    # 翻译子流程
    process_steps:
      - type: "llm_call"
        model: "deepseek-V3.2-nonthinking"
        temperature: 0.3
        max_tokens: 90000
        validate_json: true  # 验证并解析 JSON 格式
        required_fields: ["translated_text"]  # 检查字段存在且非空


        prompt: |
          你是一位专业的中译英翻译引擎。

          **翻译要求**
          1. 准确传达原文含义，不遗漏、不添加
          2. 保持原文的语气、风格和术语
          3. 确保译文流畅自然

          **原文**
          {text}

          **返回格式（纯JSON）**
          {
            "translated_text": "完整英文翻译"
          }

        output_key: "translation_result"

    # 输出：2_response (翻译结果统计)

  # ========================================
  # 步骤3：并发对齐（JSON格式，简化版）
  # ========================================
  "3":
    name: "句子级对齐"
    type: "concurrent"
    items_key: "1_response"  # 遍历原文文本块
    max_concurrent: 3        # 同时对齐3个块
    task_dispatch_delay: 1.0

    # 保存每个对齐结果
    save_to_file:
      output_dir: "{paths.aligned}"
      filename_template: "aligned_{index:04d}.txt"
      data_key: "alignment_result.aligned_text"  # 点路径：直接从 llm_call 输出中提取

    # 对齐子流程
    process_steps:
      # 读取对应的翻译结果（需要原文+译文）
      - type: "read_file"
        path_template: "{paths.translated}/trans_{index:04d}.txt"
        output_key: "translated_text"

      # 调用LLM对齐
      - type: "llm_call"
        model: "deepseek-V3.2-nonthinking"
        temperature: 0.2
        max_tokens: 90000
        validate_json: true
        required_fields: ["aligned_text"]  # 检查字段存在且非空

        prompt: |
          你是一个高精度的文本对齐引擎，任务是将英文原文与中文译文逐句对齐。

          **对齐规则**
          1. 以句子为单位对齐，中英文交替排列
          2. 格式：先中文后英文，用空格分隔
          3. 同一段落内的句子对用空格连接
          4. 不同段落之间用空行（两个换行符）分隔
          5. 进行高精度语义分析，处理一对多、多对一的情况
          6. **不要修改或重新翻译所提供的文本，只需格式化对齐**

          **中文**
          {text}

          **英文**
          {translated_text}

          **返回格式（纯JSON）**
          {
            "aligned_text": "中文句一。 English sentence one. 中文句二。 English sentence two."
          }

        output_key: "alignment_result"

    # 输出：3_response (对齐结果统计)

  # ========================================
  # 步骤4：润色翻译 + 词汇标注
  # ========================================
  "4":
    name: "润色与词汇标注"
    type: "concurrent"
    items_key: "1_response"  # 遍历原文文本块（用于索引）
    max_concurrent: 10
    task_dispatch_delay: 1.0

    save_to_file:
      output_dir: "{paths.polished}"
      filename_template: "polished_{index:04d}.txt"
      data_key: "polish_result.polished_text"

    process_steps:
      - type: "read_file"
        path_template: "{paths.aligned}/aligned_{index:04d}.txt"
        output_key: "aligned_text"

      - type: "llm_call"
        model: "deepseek-V3.2-nonthinking"
        temperature: 0.3
        max_tokens: 90000
        validate_json: true
        required_fields: ["polished_text"]

        prompt: |
          你是一位专业的英语学习材料编辑。你的任务是对一段中英对齐文本进行润色和词汇标注。

          **你需要完成三项工作：**

          ## 1. 校对翻译
          - 逐句核对中文翻译与英文原文，修正任何遗漏、误译或不通顺之处
          - 确保每句英文都有对应的中文翻译，不得遗漏
          - 译文应准确、自然、流畅，符合中文表达习惯

          ## 2. 调整顺序（严格执行）
          - 每组对齐：中文在前，英文在后，绝对不允许英文出现在中文前面
          - 同一句的中文和英文之间用一个空格分隔

          ## 3. 生僻词汇标注
          - 识别文中对于英语学习者来说生僻或有学习价值的词汇
          - 在该词首次出现的那一句之后，紧跟词汇标注
          - 格式：{{单词 [词根拆解及来源] 中文释义}}
          - 词根拆解要说明每个词根/词缀的语言来源（如拉丁语、希腊语、古英语等）和含义
          - 同一个单词在全文中只标注一次（首次出现时）
          - 专有名词（人名、地名、机构名）不标注
          - 复合词不标注，只标注单个生僻词

          ## 输出格式要求
          所有内容连成一整段，不换行不分段。词汇标注 {{}} 直接跟在对应句子后面。

          ## 示例
          2023年卸任新西兰总理后，杰辛达·阿德恩在哈佛大学任职。 After stepping down as New Zealand's prime minister in 2023, Jacinda Ardern took up a role at Harvard University. 阿德恩移居海外的决定触动了新西兰人的敏感神经——他们本就对大规模移民外流深感忧虑。 Ms Ardern's decision to live abroad has struck a nerve with Kiwis, who were already worried about high levels of emigration. {{emigration [e-(拉丁语 ex-，"向外") + migr-(拉丁语 migrare，"迁移") + -ation(名词后缀)] 移居国外，移民出境}} 政客们关注的是有多少人迁入本国。 Politicians focus on how many people migrate to their country.

          **待处理文本**
          {aligned_text}

          **返回格式（纯JSON）**
          {
            "polished_text": "处理后的完整文本"
          }

        output_key: "polish_result"

  # ========================================
  # 步骤5：合并生成ePub
  # ========================================
  "5":
    name: "生成ePub电子书"
    type: "merge_to_epub"
    aligned_key: "4_response"
    aligned_dir: "{paths.polished}"
    output_dir: "{paths.results}"
    output_filename: "{book_name}_translated.epub"
    book_title: "{book_name}"
    # 输出：5_response (ePub路径)

display:
  steps:
    "1":
      label: "文本提取"
      show: item_count
    "2":
      label: "翻译"
      show: concurrent_stats
    "3":
      label: "对齐"
      show: concurrent_stats
    "4":
      label: "润色标注"
      show: concurrent_stats
    "5":
      label: "输出文件"
      show: file_output
      keys: ["output_epub", "output_txt"]

