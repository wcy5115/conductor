project_name: "general_translation"
name: "General Translation Workflow"
description: "Extract source text into chunks, translate each chunk into a requested target language, then merge the outputs."

# User-provided values are passed in by run.ts:
# - input_epub
# - book_name
# - source_language
# - target_language

paths:
  original: "artifacts/original"
  translated: "artifacts/translated"
  results: "results"

workflow_graph: "1 -> 2 -> 3 -> END"

steps:
  "1":
    name: "Extract and split text"
    type: "epub_extract"
    input_key: "input_epub"
    target_tokens: 1000
    emergency_threshold: 1500
    save_to_file:
      output_dir: "{paths.original}"
      filename_template: "chunk_{index:04d}.txt"

  "2":
    name: "Translate chunks"
    type: "concurrent"
    items_key: "1_response"
    max_concurrent: 3
    task_dispatch_delay: 1.0
    fail_on_error: true
    save_to_file:
      output_dir: "{paths.translated}"
      filename_template: "translated_{index:04d}.txt"
      data_key: "translation_text"

    process_steps:
      - type: "read_file"
        path_template: "{paths.original}/chunk_{index:04d}.txt"
        output_key: "source_text"

      - type: "llm_call"
        model: "deepseek-v4-flash-nonthinking"
        temperature: 0.2
        max_tokens: 10000
        validate_json: false
        output_key: "translation_text"
        prompt_template: |
          You are a professional translation engine.

          Translate the source text into the requested target language.

          Requirements:
          1. Preserve the meaning, tone, style, paragraph structure, names, terminology, numbers, and formatting intent of the source text.
          2. Do not omit source information.
          3. Do not add facts, explanations, summaries, titles, comments, or notes.
          4. Keep paragraph breaks only where the source text has paragraph breaks.
          5. Output only the translated text.

          Source language:
          {source_language}

          Target language:
          {target_language}

          Source text:
          {source_text}

  "3":
    name: "Merge translated chunks"
    type: "merge_to_epub"
    aligned_key: "2_response"
    aligned_dir: "{paths.translated}"
    output_dir: "{paths.results}"
    output_filename: "{book_name}_translated.epub"
    book_title: "{book_name} - Translation"

display:
  steps:
    "1":
      label: "Extract"
      show: chunk_count
    "2":
      label: "Translate"
      show: concurrent_stats
    "3":
      label: "Merge"
      show: output_files
