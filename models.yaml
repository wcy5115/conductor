# ==================== DeepSeek V3.2 ====================
deepseek-V3.2-nonthinking:
  - enabled: true          # 当前启用：阿里千问 API
    provider: aliyuncs
    api_url: https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
    api_key: ${ALIYUNCS_API_KEY}
    model_name: deepseek-v3.2-exp
