# 模型配置文件
#
# 格式说明：
#   - api_key 支持 ${ENV_VAR} 语法，程序启动时自动读取对应环境变量
#   - 单配置：直接写字典
#   - 多配置（多提供商备选）：写数组，用 enabled: true/false 切换启用哪一个
#
# 价格单位：人民币 / 百万 tokens

# ==================== GPT-4 ====================
gpt4:
  - enabled: true          # 当前启用：OpenAI 官方
    provider: openai
    api_url: https://api.openai.com/v1/chat/completions
    api_key: ${OPENAI_API_KEY}
    model_name: gpt-4
    temperature: 0.7
    max_tokens: 4000
    pricing:
      input: 30.0
      output: 60.0
      currency: CNY

  - enabled: false         # 备用：OpenRouter
    provider: openrouter
    api_url: https://openrouter.ai/api/v1/chat/completions
    api_key: ${OPENROUTER_API_KEY}
    model_name: openai/gpt-4
    temperature: 0.7
    max_tokens: 4000
    pricing:
      input: 28.0
      output: 58.0
      currency: CNY

# ==================== Gemini 3 ====================
genmini3:
  - enabled: true
    provider: UnifyLLM
    api_url: https://apihk.unifyllm.top/v1/chat/completions
    api_key: ${UNIFYLLM_API_KEY}
    model_name: gemini-3-pro-preview-thinking
    temperature: 1
    max_tokens: 8000
    pricing:
      input: 1.2
      output: 7.2
      currency: CNY

  - enabled: false
    provider: openrouter
    api_url: https://openrouter.ai/api/v1/chat/completions
    api_key: ${OPENROUTER_API_KEY}
    model_name: openai/gpt-4
    temperature: 0.7
    max_tokens: 4000
    pricing:
      input: 28.0
      output: 58.0
      currency: CNY

